name: CI

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Check formatting
        run: npx oxfmt --check server/src/ shared/ web-client/src/

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Run oxlint
        run: npx oxlint server/src/ shared/ web-client/src/

      - name: Run ESLint (web-client)
        run: npx eslint .
        working-directory: web-client
